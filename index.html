<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Graph Tools</title>
    <meta name="description" content="Parse, graph, search, and compare WildFly's management model across versions and feature packs.">
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f7f7f7;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --border: #e5e7eb;
            --accent: #e53e3e;
            --accent-hover: #c53030;
            --terminal-bg: #1a1a2e;
            --terminal-text: #c9d1d9;
            --terminal-prompt: #e53e3e;
            --terminal-success: #7ee787;
            --terminal-muted: #8b949e;
            --green: #22c55e;
            --green-bg: #f0fdf4;
            --green-text: #16a34a;
            --blue: #3b82f6;
            --blue-bg: #eff6ff;
            --blue-text: #2563eb;
            --amber: #eab308;
            --amber-bg: #fefce8;
            --amber-text: #ca8a04;
            --purple: #a855f7;
            --purple-bg: #faf5ff;
            --purple-text: #9333ea;
            --red-bg: #fef2f2;
            --max-width: 1080px;
        }

        [data-theme="dark"] {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --border: #30363d;
            --accent: #e53e3e;
            --accent-hover: #f56565;
            --terminal-bg: #161b22;
            --green-bg: #0d1117;
            --green-text: #7ee787;
            --blue-bg: #0d1117;
            --blue-text: #79c0ff;
            --amber-bg: #0d1117;
            --amber-text: #e3b341;
            --purple-bg: #0d1117;
            --purple-text: #d2a8ff;
            --red-bg: #0d1117;
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg: #0d1117;
                --bg-secondary: #161b22;
                --text: #c9d1d9;
                --text-secondary: #8b949e;
                --border: #30363d;
                --accent: #e53e3e;
                --accent-hover: #f56565;
                --terminal-bg: #161b22;
                --green-bg: #0d1117;
                --green-text: #7ee787;
                --blue-bg: #0d1117;
                --blue-text: #79c0ff;
                --amber-bg: #0d1117;
                --amber-text: #e3b341;
                --purple-bg: #0d1117;
                --purple-text: #d2a8ff;
                --red-bg: #0d1117;
            }
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background 0.2s, color 0.2s;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        .mono {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .logo {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            color: var(--text);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
        }

        .github-link {
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .github-link:hover {
            color: var(--accent);
        }

        .hero {
            display: flex;
            align-items: center;
            gap: 48px;
            padding: 80px 0;
        }

        .hero-text {
            flex: 1;
        }

        .hero-label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .hero-title {
            font-size: 2.25rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            max-width: 480px;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .hero-terminal {
            flex: 0 0 340px;
            background: var(--terminal-bg);
            border-radius: 8px;
            padding: 24px;
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .hero-terminal .prompt {
            color: var(--terminal-prompt);
        }

        .hero-terminal .cmd {
            color: var(--terminal-text);
        }

        .hero-terminal .muted {
            color: var(--terminal-muted);
        }

        .hero-terminal .success {
            color: var(--terminal-success);
        }

        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                padding: 48px 0;
                gap: 32px;
            }

            .hero-terminal {
                flex: none;
                width: 100%;
            }

            .hero-title {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
<header>
    <a href="/" class="logo mono">Model Graph Tools</a>
    <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <span id="themeIcon">&#9789;</span>
        </button>
        <a href="https://github.com/model-graph-tools" class="github-link" target="_blank" rel="noopener">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            GitHub
        </a>
    </div>
</header>
<section class="hero container">
    <div class="hero-text">
        <div class="hero-label mono">MODEL GRAPH TOOLS</div>
        <h1 class="hero-title">Explore the WildFly<br>Management Model</h1>
        <p class="hero-subtitle">Parse, graph, search, and compare WildFly's management model across versions and feature packs.</p>
        <div class="hero-actions">
            <a href="#install" class="btn btn-primary">Get Started</a>
            <a href="https://github.com/model-graph-tools" class="btn btn-outline" target="_blank" rel="noopener">GitHub &rarr;</a>
        </div>
    </div>
    <div class="hero-terminal mono">
        <div><span class="prompt">$</span> <span class="cmd">mgt start 39</span></div>
        <div class="muted">Starting model graph for WildFly 39...</div>
        <div class="success">&#10003; Ready on port 7474</div>
    </div>
</section>
<script>
    (function () {
        var STORAGE_KEY = "mgt-theme";
        var toggle = document.getElementById("themeToggle");
        var icon = document.getElementById("themeIcon");
        var html = document.documentElement;

        function getPreferred() {
            var stored = localStorage.getItem(STORAGE_KEY);
            if (stored) return stored;
            return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }

        function apply(theme) {
            html.setAttribute("data-theme", theme);
            icon.textContent = theme === "dark" ? "☀" : "☽";
        }

        apply(getPreferred());

        toggle.addEventListener("click", function () {
            var next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
            localStorage.setItem(STORAGE_KEY, next);
            apply(next);
        });
    })();
</script>
</body>
</html>
